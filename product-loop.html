<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>F*CK PACE · Product Loop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Archivo+Black&display=swap" rel="stylesheet">
<style>
  :root {
    --display: 'Archivo Black', sans-serif;
    --mono: 'Space Mono', ui-monospace, monospace;
    --bg: #0A0A0A;
    --fg: #FFF;
    --dim: rgba(255,255,255,0.45);
    --dimmer: rgba(255,255,255,0.18);
    --accent: #F2703B;
    --ease: cubic-bezier(0.22, 0.61, 0.36, 1);
    --loop: 7s;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #050505;
    min-height: 100vh;
    display: grid;
    place-items: center;
    font-family: var(--mono);
    color: var(--fg);
    padding: 24px;
  }
  /* Fill mode (?fill=1): the stage fills the whole page — no letterbox/side bars */
  body.fill { padding: 0; }
  body.fill .stage { width: 100vw; height: 100svh; }
  body.fill .card { width: min(58vmin, 560px); }

  /* Mini mode (?mini=1): compact embed (e.g. inside the order-form accordion).
     Stage fills the iframe with no padding/scroll, and the HUD text is hidden
     so it never overlaps the shirt on small/phone widths. */
  html.mini, body.mini { width: 100%; height: 100%; }
  body.mini { padding: 0; overflow: hidden; }
  body.mini .stage { width: 100%; height: 100%; }
  body.mini .hud { display: none; }
  body.mini .bracket { width: 14px; height: 14px; }
  body.mini .b-tl, body.mini .b-tr { top: 10px; }
  body.mini .b-bl, body.mini .b-br { bottom: 10px; }
  body.mini .b-tl, body.mini .b-bl { left: 10px; }
  body.mini .b-tr, body.mini .b-br { right: 10px; }

  /* ───── STAGE ───── */
  .stage {
    position: relative;
    width: min(800px, 90vmin);
    height: min(800px, 90vmin);
    background: var(--bg);
    overflow: hidden;
    isolation: isolate;
  }
  .stage::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(to right, var(--dimmer) 1px, transparent 1px),
      linear-gradient(to bottom, var(--dimmer) 1px, transparent 1px);
    background-size: 8% 8%;
    mask-image: radial-gradient(ellipse 100% 90% at 50% 50%, #000 30%, transparent 95%);
    -webkit-mask-image: radial-gradient(ellipse 100% 90% at 50% 50%, #000 30%, transparent 95%);
    opacity: 0.5;
    z-index: 1;
    animation: gridBreathe 4s ease-in-out infinite;
  }
  .stage::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image: repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,0) 0px,
      rgba(255,255,255,0) 2px,
      rgba(255,255,255,0.04) 3px,
      rgba(255,255,255,0) 4px
    );
    mix-blend-mode: screen;
    z-index: 2;
    pointer-events: none;
    animation: scanShift 8s linear infinite;
  }

  /* ───── HUD ───── */
  .hud {
    position: absolute;
    inset: 24px;
    pointer-events: none;
    z-index: 9;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--dim);
  }
  .hud-row { position: absolute; display: flex; align-items: center; gap: 8px; }
  .hud-tl { top: 0; left: 0; flex-direction: column; align-items: flex-start; gap: 4px; }
  .hud-tr { top: 0; right: 0; align-items: flex-end; flex-direction: column; gap: 4px; }
  .hud-bl { bottom: 0; left: 0; flex-direction: column; align-items: flex-start; gap: 4px; }
  .hud-br { bottom: 0; right: 0; flex-direction: column; align-items: flex-end; gap: 4px; }

  .hud-tag { color: var(--fg); font-family: var(--display); font-size: 11px; letter-spacing: 0.16em; }
  .hud-dim { color: var(--dim); }
  .hud-rec { display: inline-flex; align-items: center; gap: 8px; color: var(--fg); }
  .hud-rec-dot {
    width: 8px; height: 8px; background: var(--accent); border-radius: 50%;
    box-shadow: 0 0 8px var(--accent); animation: pulse 1s ease-in-out infinite;
  }

  /* Corner brackets */
  .bracket { position: absolute; width: 20px; height: 20px; border: 1.5px solid var(--fg); z-index: 9; }
  .b-tl { top: 18px; left: 18px;     border-right: none; border-bottom: none; }
  .b-tr { top: 18px; right: 18px;    border-left: none;  border-bottom: none; }
  .b-bl { bottom: 18px; left: 18px;  border-right: none; border-top: none; }
  .b-br { bottom: 18px; right: 18px; border-left: none;  border-top: none; }

  /* ───── PRODUCT CARD ───── */
  .card-wrap { position: absolute; inset: 0; display: grid; place-items: center; perspective: 1600px; z-index: 4; }
  .card {
    width: 62%;
    aspect-ratio: 1 / 1.04;
    position: relative;
    transform-style: preserve-3d;
    animation: cardFlip var(--loop) infinite var(--ease);
    will-change: transform;
  }
  .face {
    position: absolute; inset: 0;
    background: transparent; border: none;
    backface-visibility: hidden;
    display: grid; place-items: center; overflow: hidden;
  }
  .face-back { transform: rotateY(180deg); }

  /* ── Cap mode: single framed photo on a cream plate, no 3D flip ── */
  .card.is-cap { animation: none; transform: none !important; }
  .card.is-cap .face-back,
  .card.is-cap .simple-strobe { display: none; }
  .card.is-cap .face-front {
    background: #F4F2EE;
    border: 1px solid var(--dimmer);
  }
  .card.is-cap .photo {
    object-fit: contain;
    padding: 4%;
    animation: capJitter 7s steps(1, end) infinite;
  }
  /* the reflective overlay becomes a camera-flash bloom on the cap */
  .card.is-cap .refl img {
    filter: brightness(1.8) contrast(1.1) saturate(0);
    padding: 7%;
  }
  @keyframes capJitter {
    0%, 5%       { transform: translate(0,0); filter: none; }
    5.3%, 5.7%   { transform: translate(-4px,0); filter: contrast(1.4) brightness(1.1); }
    6%, 12%      { transform: translate(0,0); filter: none; }
    12.3%, 12.6% { transform: translate(5px,-1px); filter: contrast(1.4); }
    12.9%, 19%   { transform: translate(0,0); filter: none; }
    19.4%, 19.9% { transform: translate(-3px,1px); filter: contrast(1.4) brightness(1.1); }
    20.2%, 25%   { transform: translate(0,0); filter: none; }
    25.3%, 25.6% { transform: translate(3px,0); filter: contrast(1.4); }
    25.9%, 100%  { transform: translate(0,0); filter: none; }
  }

  .photo { width: 100%; height: 100%; object-fit: contain; display: block; }

  /* Reflective overlay — brightened + screen blend, pops during flash */
  .refl { position: absolute; inset: 0; pointer-events: none; }
  .refl img {
    width: 100%; height: 100%; object-fit: contain; display: block;
    filter: brightness(2.6) contrast(1.25) saturate(0);
    mix-blend-mode: screen;
  }
  .refl-flash { opacity: 0; animation: flashPop var(--loop) steps(1, end) infinite; }

  /* Wordmark glitch — full design minus the F*CK PACE wordmark, strobing
     during the front portion so only the wordmark appears to fail/flicker. */
  .simple-strobe { position: absolute; inset: 0; pointer-events: none; opacity: 0; animation: simpleStrobe var(--loop) steps(1, end) infinite; }
  .simple-strobe img {
    width: 100%; height: 100%; object-fit: contain; display: block;
    filter: brightness(1.3) contrast(1.5) saturate(0);
  }

  /* Camera flash overlay */
  .camera-flash {
    position: absolute; inset: 0; background: #fff; opacity: 0;
    z-index: 7; pointer-events: none; mix-blend-mode: screen;
    animation: cameraFlash var(--loop) linear infinite;
  }

  .face-label {
    position: absolute; top: 8px; left: 10px;
    font-family: var(--mono); font-size: 9px; letter-spacing: 0.18em;
    color: rgba(255,255,255,0.32); text-transform: uppercase; z-index: 2;
  }
  .face-label-r { left: auto; right: 10px; }

  /* ───── ANIMATIONS ───── */
  @keyframes cardFlip {
    0%   { transform: rotateY(0deg); }
    42%  { transform: rotateY(0deg); }
    50%  { transform: rotateY(180deg); }
    92%  { transform: rotateY(180deg); }
    100% { transform: rotateY(360deg); }
  }
  @keyframes flashPop {
    0%, 28%   { opacity: 0; }
    29%, 31%  { opacity: 1; }
    32%, 78%  { opacity: 0; }
    79%, 81%  { opacity: 1; }
    82%, 100% { opacity: 0; }
  }
  @keyframes simpleStrobe {
    0%,    5%     { opacity: 0; }
    5.3%,  5.7%   { opacity: 1; }
    6%,    12%    { opacity: 0; }
    12.3%, 12.6%  { opacity: 1; }
    12.9%, 19%    { opacity: 0; }
    19.4%, 19.9%  { opacity: 1; }
    20.2%, 25%    { opacity: 0; }
    25.3%, 25.6%  { opacity: 1; }
    25.9%, 28.5%  { opacity: 0; }
    29%,   31%    { opacity: 1; }
    31.5%, 100%   { opacity: 0; }
  }
  @keyframes cameraFlash {
    0%, 28%   { opacity: 0; }
    29%       { opacity: 0.85; }
    30%       { opacity: 0.55; }
    33%       { opacity: 0; }
    78%       { opacity: 0; }
    79%       { opacity: 0.85; }
    80%       { opacity: 0.55; }
    83%       { opacity: 0; }
    100%      { opacity: 0; }
  }
  @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(1.4); } }
  @keyframes scanShift { from { background-position: 0 0; } to { background-position: 0 100px; } }
  @keyframes gridBreathe { 0%, 100% { opacity: 0.5; } 50% { opacity: 0.7; } }

  .flash-tag { color: var(--dim); font-family: var(--display); font-size: 11px; letter-spacing: 0.18em; animation: flashTag var(--loop) steps(1, end) infinite; }
  @keyframes flashTag {
    0%, 28%, 33%, 78%, 83%, 100% { color: rgba(255,255,255,0.45); }
    29%, 30%, 79%, 80%           { color: var(--accent); }
  }
  .side-tag { font-family: var(--display); color: var(--fg); font-size: 11px; letter-spacing: 0.18em; }
  .stamp { font-family: var(--display); font-size: 13px; letter-spacing: 0.14em; color: var(--fg); animation: stampGlow var(--loop) steps(1, end) infinite; }
  @keyframes stampGlow {
    0%, 28%, 33%, 78%, 83%, 100% { text-shadow: none; color: rgba(255,255,255,0.55); }
    29%, 30%, 79%, 80%           { text-shadow: 0 0 12px var(--accent), 0 0 24px var(--accent); color: var(--fg); }
  }
</style>
</head>
<body>

<div class="stage" id="stage">
  <div class="card-wrap">
    <div class="card">
      <!-- FRONT (full detailed design — wordmark glitches) -->
      <div class="face face-front">
        <div class="face-label">SIDE_A · BACK_ART</div>
        <div class="face-label face-label-r" id="reflLabel">REFL.IDX 0.97</div>
        <img class="photo" id="frontPhoto" alt="" />
        <div class="simple-strobe" aria-hidden="true">
          <img id="glitchPhoto" alt="" />
        </div>
        <div class="refl refl-flash">
          <img id="frontRefl" alt="" aria-hidden="true" />
        </div>
      </div>
      <!-- BACK (small-logo front) -->
      <div class="face face-back">
        <div class="face-label">SIDE_B · FRONT</div>
        <div class="face-label face-label-r">REFL.IDX 0.92</div>
        <img class="photo" id="backPhoto" alt="" />
        <div class="refl refl-flash">
          <img id="backRefl" alt="" aria-hidden="true" />
        </div>
      </div>
    </div>
  </div>

  <div class="camera-flash" aria-hidden="true"></div>

  <div class="bracket b-tl"></div>
  <div class="bracket b-tr"></div>
  <div class="bracket b-bl"></div>
  <div class="bracket b-br"></div>

  <div class="hud">
    <div class="hud-row hud-tl">
      <span class="hud-tag" id="hudTag">FIG.02 / CAMISETA M.L.</span>
      <span class="hud-dim" id="hudColor">COLOR · NULL_BLACK</span>
      <span class="hud-dim" id="hudPrint">REFLECTIVE PRINT · ON</span>
    </div>
    <div class="hud-row hud-tr">
      <span class="hud-rec"><span class="hud-rec-dot"></span> REC</span>
      <span class="hud-dim" id="counter">00:00:00</span>
      <span class="hud-dim">24FPS</span>
    </div>
    <div class="hud-row hud-bl">
      <span class="hud-dim">BOOT_V1 // DROP_002</span>
      <span class="side-tag" id="side-tag"></span>
      <span class="flash-tag">▣ FLASH</span>
    </div>
    <div class="hud-row hud-br">
      <span class="stamp">F*CK PACE</span>
      <span class="hud-dim">NO ONE LEFT BEHIND</span>
      <span class="hud-dim">RUNNING_CLUB</span>
    </div>
  </div>
</div>

<script>
  // ── product catalog ──
  const CATALOG = {
    'mc-preta':  { tag: 'FIG.01 / CAMISETA M.C.', color: 'COLOR · NULL_BLACK',  print: 'REFLECTIVE PRINT · ON',  reflective: true  },
    'ml-preta':  { tag: 'FIG.02 / CAMISETA M.L.', color: 'COLOR · NULL_BLACK',  print: 'REFLECTIVE PRINT · ON',  reflective: true  },
    'mc-branca': { tag: 'FIG.01 / CAMISETA M.C.', color: 'COLOR · VOID_WHITE',  print: 'STANDARD PRINT · ON',    reflective: false },
    'ml-branca': { tag: 'FIG.02 / CAMISETA M.L.', color: 'COLOR · VOID_WHITE',  print: 'STANDARD PRINT · ON',    reflective: false },
  };

  // Caps: single product photo (white-bg studio shot, can't be background-cut),
  // shown framed on a cream plate with flash + jitter glitch, no 3D flip.
  const CAPS = {
    'bone-rc':    { tag: 'FIG.03 / BONÉ', color: 'MODEL · RUNNING_CLUB', print: 'EMBROIDERY · ON', img: 'https://lh7-rt.googleusercontent.com/formsz/AN7BsVDFEvEMM0SHKYf7VzG1rmUYEgRG5AU309BcYmYlWNjkEC49yjSrmyzedqGT7Q0niodh3i1AsxAbg2FaI2OyV1HVCHlVddBj45Xg4D4EfBGEDcX203uX0H7-79FfoYPRcA1ALMzsHfQ6ayXb1ultq7PcLG7rj992Y3Tf9aebi1eCdn3PuxUmgrofuauoLjkWQwf4uZS9VlJNlhca=w740?key=FLw7ew20KoKOQmVA9fNw1w' },
    'bone-globo': { tag: 'FIG.03 / BONÉ', color: 'MODEL · GLOBO',        print: 'EMBROIDERY · ON', img: 'https://lh7-rt.googleusercontent.com/formsz/AN7BsVA0eXaesXclZqmyiCU9fiLBcS8g6ij-AjkZLMmzq0GELTtWNl9K37-9uHJw7-GiPYpBTZ1tIZs_0v8cDBsqXx2todJiYLYW2Vt2RiTaHcQWErwEhmKgheZFwBxCQGoSlP6R5ixDpxZGkjfz0VcDZQ2OSgR56RJ3wsA3TXnXPwWgZnAAtvjDW9OON69zijD4V5d26TrhP_Gcco_n=w740?key=FLw7ew20KoKOQmVA9fNw1w' },
  };

  const params = new URLSearchParams(location.search);
  if (params.get('fill') === '1') document.body.classList.add('fill');
  if (params.get('mini') === '1') { document.documentElement.classList.add('mini'); document.body.classList.add('mini'); }
  const requested = params.get('product');
  const isCap = !!CAPS[requested];
  let isShirtSide = true; // whether the live side-tag should swap (shirts only)

  if (isCap) {
    const cap = CAPS[requested];
    document.querySelector('.card').classList.add('is-cap');
    document.getElementById('frontPhoto').src = cap.img;
    document.getElementById('frontRefl').src  = cap.img;
    document.getElementById('glitchPhoto').removeAttribute('src');
    document.getElementById('hudTag').textContent   = cap.tag;
    document.getElementById('hudColor').textContent = cap.color;
    document.getElementById('hudPrint').textContent = cap.print;
    document.getElementById('reflLabel').textContent = 'STUDIO.IDX 0.88';
    document.getElementById('side-tag').textContent = 'SIDE · STUDIO';
    isShirtSide = false;
  } else {
    const key = CATALOG[requested] ? requested : 'ml-preta';
    const data = CATALOG[key];
    const full = `${key}-full-cut.png`;
    const glitch = `${key}-nowordmark-cut.png`;
    const alt = `${key}-alt-cut.png`;

    document.getElementById('frontPhoto').src = full;
    document.getElementById('frontRefl').src  = full;
    document.getElementById('glitchPhoto').src = glitch;
    document.getElementById('backPhoto').src = alt;
    document.getElementById('backRefl').src  = alt;

    document.getElementById('hudTag').textContent = data.tag;
    document.getElementById('hudColor').textContent = data.color;
    document.getElementById('hudPrint').textContent = data.print;
    document.getElementById('reflLabel').textContent = data.reflective ? 'REFL.IDX 0.97' : 'PRINT.IDX 0.62';

    // For white shirts the prints are dark — the screen-blend "glow" does nothing,
    // so soften the reflective copies to avoid a faint wash.
    if (!data.reflective) {
      document.querySelectorAll('.refl img').forEach(el => { el.style.opacity = '0.4'; });
    }
  }

  // ── live counter + side indicator ──
  const LOOP_MS = 7000;
  const counterEl = document.getElementById('counter');
  const sideEl = document.getElementById('side-tag');
  const start = performance.now();
  function tick(now) {
    const e = (now - start) / 1000;
    counterEl.textContent =
      String(Math.floor(e/60)).padStart(2,'0') + ':' +
      String(Math.floor(e%60)).padStart(2,'0') + ':' +
      String(Math.floor((e*100)%100)).padStart(2,'0');
    if (isShirtSide) {
      const phase = ((now - start) % LOOP_MS) / LOOP_MS;
      sideEl.textContent = (phase < 0.5) ? 'SIDE · BACK_ART' : 'SIDE · FRONT';
    }
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
</script>

</body>
</html>
